<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SEO Checker</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        min-height: 100vh;
        padding: 40px 16px;
      }

      .wrap {
        max-width: 760px;
        margin: 0 auto;
      }

      header {
        text-align: center;
        margin-bottom: 36px;
      }
      header h1 {
        font-size: 2rem;
        font-weight: 800;
        letter-spacing: -0.02em;
      }
      header h1 span {
        color: #6366f1;
      }
      header p {
        margin-top: 8px;
        color: #64748b;
        font-size: 0.95rem;
      }

      .search-bar {
        display: flex;
        gap: 8px;
        background: #fff;
        border-radius: 14px;
        padding: 10px 12px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        margin-bottom: 32px;
      }
      .search-bar input {
        flex: 1;
        border: none;
        outline: none;
        font-size: 1rem;
        color: #1e293b;
        background: transparent;
      }
      .search-bar input::placeholder {
        color: #94a3b8;
      }
      .search-bar button {
        background: #6366f1;
        color: #fff;
        border: none;
        border-radius: 9px;
        padding: 10px 22px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
        white-space: nowrap;
      }
      .search-bar button:hover {
        background: #4f46e5;
      }
      .search-bar button:disabled {
        background: #a5b4fc;
        cursor: not-allowed;
      }

      /* 결과 영역 */
      #results {
        display: none;
      }

      .result-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
        flex-wrap: wrap;
        gap: 8px;
      }
      .result-url {
        font-size: 0.82rem;
        color: #64748b;
        word-break: break-all;
      }
      .score-badge {
        font-size: 0.9rem;
        font-weight: 700;
        padding: 4px 14px;
        border-radius: 999px;
      }
      .score-badge.good {
        background: #dcfce7;
        color: #16a34a;
      }
      .score-badge.mid {
        background: #fef9c3;
        color: #a16207;
      }
      .score-badge.bad {
        background: #fee2e2;
        color: #dc2626;
      }

      .cards {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .card {
        background: #fff;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.07);
        border-left: 5px solid #e2e8f0;
      }
      .card.pass {
        border-left-color: #22c55e;
      }
      .card.warn {
        border-left-color: #f59e0b;
      }
      .card.fail {
        border-left-color: #ef4444;
      }

      .card-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 18px;
        cursor: pointer;
        user-select: none;
      }
      .card-header:hover {
        background: #f8fafc;
      }

      .status-icon {
        font-size: 1.1rem;
        flex-shrink: 0;
      }
      .card-name {
        font-weight: 600;
        font-size: 0.95rem;
        flex: 1;
      }
      .card-msg {
        font-size: 0.82rem;
        color: #64748b;
      }
      .toggle-icon {
        font-size: 0.75rem;
        color: #94a3b8;
        transition: transform 0.2s;
      }
      .card.open .toggle-icon {
        transform: rotate(180deg);
      }

      .card-body {
        display: none;
        padding: 0 18px 14px;
        border-top: 1px solid #f1f5f9;
      }
      .card.open .card-body {
        display: block;
      }

      .detail-item {
        display: flex;
        gap: 8px;
        padding: 6px 0;
        font-size: 0.83rem;
        line-height: 1.5;
        border-bottom: 1px solid #f8fafc;
      }
      .detail-item:last-child {
        border-bottom: none;
      }
      .detail-icon {
        flex-shrink: 0;
        margin-top: 1px;
      }

      .detail-item.tip {
        background: #eff6ff;
        border-radius: 6px;
        padding: 7px 10px;
        border-bottom: none;
        margin-top: 2px;
        color: #1d4ed8;
        font-size: 0.81rem;
      }
      .detail-item.tip .detail-icon {
        color: #3b82f6;
      }

      /* 로딩 */
      .loader {
        text-align: center;
        padding: 40px 0;
        color: #94a3b8;
        display: none;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid #e2e8f0;
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 12px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .error-box {
        background: #fee2e2;
        color: #b91c1c;
        border-radius: 10px;
        padding: 14px 18px;
        font-size: 0.9rem;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>SEO <span>Checker</span></h1>
        <p>URL을 입력하면 주요 SEO 항목을 자동으로 분석합니다.</p>
      </header>

      <div class="search-bar">
        <input
          type="text"
          id="urlInput"
          placeholder="https://example.com"
          autocomplete="off"
        />
        <button id="checkBtn">검사 시작</button>
      </div>

      <div class="loader" id="loader">
        <div class="spinner"></div>
        분석 중...
      </div>

      <div class="error-box" id="errorBox"></div>

      <div id="results">
        <div class="result-header">
          <div class="result-url" id="resultUrl"></div>
          <div class="score-badge" id="scoreBadge"></div>
        </div>
        <div class="cards" id="cards"></div>
      </div>
    </div>

    <script>
      const input = document.getElementById("urlInput");
      const btn = document.getElementById("checkBtn");
      const loader = document.getElementById("loader");
      const results = document.getElementById("results");
      const errorBox = document.getElementById("errorBox");
      const cardsEl = document.getElementById("cards");
      const resultUrl = document.getElementById("resultUrl");
      const scoreBadge = document.getElementById("scoreBadge");

      async function runCheck() {
        const url = input.value.trim();
        if (!url) {
          input.focus();
          return;
        }

        // 초기화
        results.style.display = "none";
        errorBox.style.display = "none";
        loader.style.display = "block";
        btn.disabled = true;
        cardsEl.innerHTML = "";

        try {
          const res = await fetch(`https://dev-n8n.ais.hivelab.co.kr/webhook/seo-check?url=${encodeURIComponent(url)}`);
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "서버 오류");

          loader.style.display = "none";
          results.style.display = "block";

          resultUrl.textContent = data.url;

          const passCount = data.checks.filter((c) => c.pass).length;
          const total = data.checks.length;
          scoreBadge.textContent = `${passCount} / ${total} 통과`;
          scoreBadge.className =
            "score-badge " +
            (passCount === total
              ? "good"
              : passCount >= total / 2
                ? "mid"
                : "bad");

          data.checks.forEach((check) => {
            const card = document.createElement("div");
            const status = check.warn ? "warn" : check.pass ? "pass" : "fail";
            card.className = `card ${status}`;

            const header = document.createElement("div");
            header.className = "card-header";
            const statusIcon = status === "pass" ? "✅" : status === "warn" ? "⚠️" : "❌";
            header.innerHTML = `
            <span class="status-icon">${statusIcon}</span>
            <span class="card-name">${check.name}</span>
            <span class="card-msg">${check.message}</span>
            <span class="toggle-icon">▼</span>
          `;

            const body = document.createElement("div");
            body.className = "card-body";

            function escapeHtml(str) {
              return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
            }
            if (check.details && check.details.length > 0) {
              check.details.forEach((d) => {
                const item = document.createElement("div");
                const safeText = escapeHtml(d.text);
                if (d.type === "tip") {
                  item.className = "detail-item tip";
                  item.innerHTML = `<span class="detail-icon">💡</span><span>${safeText.replace(/\n/g, "<br>")}</span>`;
                } else {
                  item.className = "detail-item";
                  const icon = d.type === "warn" ? "❗" : "ℹ️";
                  item.innerHTML = `<span class="detail-icon">${icon}</span><span>${safeText}</span>`;
                }
                body.appendChild(item);
              });
            } else {
              body.innerHTML =
                '<div class="detail-item"><span class="detail-icon">ℹ️</span><span>세부 정보 없음</span></div>';
            }

            header.addEventListener("click", () => {
              card.classList.toggle("open");
            });

            card.appendChild(header);
            card.appendChild(body);
            cardsEl.appendChild(card);
          });
        } catch (err) {
          loader.style.display = "none";
          errorBox.style.display = "block";
          errorBox.textContent = `오류: ${err.message}`;
        } finally {
          btn.disabled = false;
        }
      }

      btn.addEventListener("click", runCheck);
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") runCheck();
      });
    </script>
  </body>
</html>
